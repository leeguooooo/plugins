name: Auto-sync plugin versions

# Pull-based version sync: instead of every source repo pushing a
# repository_dispatch (which needs a cross-repo PAT in each repo), this
# workflow walks every github-source entry in marketplace.json and reads
# the current version from the source repo itself. Zero per-repo setup;
# new marketplace entries are picked up automatically.
#
# Version source precedence (first hit wins):
#   1. .claude-plugin/plugin.json  (authoritative for strict:true plugins)
#   2. package.json
#   3. Cargo.toml   (first top-level `version = "..."`)
#   4. pyproject.toml
#   5. latest GitHub release tag (skipped for entries with a subpath —
#      the host repo's tags may be unrelated to the plugin)

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync versions from source repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, re, urllib.request, urllib.error, pathlib

          TOKEN = os.environ.get("GH_TOKEN", "")

          def fetch(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.read().decode()
              except urllib.error.HTTPError:
                  return None

          def raw(repo, ref, path):
              return fetch(f"https://raw.githubusercontent.com/{repo}/{ref}/{path}")

          def manifest_version(repo, ref, sub):
              p = (sub.rstrip("/") + "/") if sub else ""
              txt = raw(repo, ref, p + ".claude-plugin/plugin.json")
              if txt:
                  try:
                      v = json.loads(txt).get("version")
                      if v: return v
                  except ValueError:
                      pass
              txt = raw(repo, ref, p + "package.json")
              if txt:
                  try:
                      v = json.loads(txt).get("version")
                      if v: return v
                  except ValueError:
                      pass
              for f in ("Cargo.toml", "pyproject.toml"):
                  txt = raw(repo, ref, p + f)
                  if txt:
                      m = re.search(r'^version\s*=\s*"([^"]+)"', txt, re.M)
                      if m: return m.group(1)
              return None

          def release_version(repo):
              txt = fetch(
                  f"https://api.github.com/repos/{repo}/releases/latest",
                  {"Authorization": f"Bearer {TOKEN}"} if TOKEN else {},
              )
              if txt:
                  tag = json.loads(txt).get("tag_name", "")
                  m = re.search(r"(\d+\.\d+\.\d+(?:[-.][\w.]+)?)$", tag)
                  if m: return m.group(1)
              return None

          path = pathlib.Path(".claude-plugin/marketplace.json")
          data = json.loads(path.read_text())
          changed = []
          for entry in data.get("plugins", []):
              src = entry.get("source")
              if not isinstance(src, dict) or src.get("source") != "github":
                  continue
              repo, ref, sub = src["repo"], src.get("ref", "main"), src.get("path", "")
              v = manifest_version(repo, ref, sub)
              if not v and not sub:
                  v = release_version(repo)
              if v and v != entry.get("version"):
                  changed.append(f'{entry["name"]}: {entry.get("version")} -> {v}')
                  entry["version"] = v
          if changed:
              path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n")
              summary = "; ".join(changed)
              pathlib.Path(os.environ["GITHUB_ENV"]).open("a").write(
                  f"SYNC_SUMMARY={summary}\n"
              )
          print("\n".join(changed) if changed else "all versions up to date")
          EOF

      - name: Commit & push
        run: |
          if [ -z "$SYNC_SUMMARY" ]; then
            echo "Nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: auto-sync plugin versions ($SYNC_SUMMARY)"
          git push
